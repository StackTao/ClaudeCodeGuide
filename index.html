<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Claude Code 中文实践文档</title>
    <meta
      name="description"
      content="Claude Code 中文实践文档：命令、插件、skills、MCP、社区经验和实战案例。"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar" id="sidebar">
        <div class="brand">
          <div class="brand-mark">CC</div>
          <div>
            <strong>Claude Code Guide</strong>
            <span>中文实践文档</span>
          </div>
        </div>
        <div class="repo-card">
          <a id="githubSidebarLink" target="_blank" rel="noreferrer">StackTao/ClaudeCodeGuide</a>
          <span>GitHub 源仓库与实时更新</span>
        </div>
        <nav class="doc-nav" id="docNav" aria-label="文档"></nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="topbar-inner">
            <button class="icon-button menu-button" id="menuButton" type="button" aria-label="打开目录">
              <span></span>
              <span></span>
              <span></span>
            </button>
            <label class="search">
              <span>搜索</span>
              <input id="searchInput" type="search" placeholder="命令、插件、Superpowers、MCP..." />
            </label>
            <button class="icon-button theme-button" id="themeButton" type="button" aria-label="切换深色模式">◐</button>
            <a class="secondary-button top-github" id="githubTopLink" target="_blank" rel="noreferrer">GitHub 仓库</a>
            <a class="top-link" id="issueTopLink" target="_blank" rel="noreferrer">提出修改</a>
          </div>
        </header>

        <div class="content-grid">
          <article class="document">
            <section class="github-status" id="githubStatus">
              <div>
                <strong>GitHub 同步</strong>
                <span id="githubStatusText">正在检查远端更新...</span>
                <span id="githubPagesText">线上站点将在 GitHub Pages 部署后可访问。</span>
              </div>
              <div class="github-actions">
                <a id="githubRepoLink" target="_blank" rel="noreferrer">查看仓库</a>
                <a id="githubPagesLink" target="_blank" rel="noreferrer">线上站点</a>
                <a id="githubActionsLink" target="_blank" rel="noreferrer">部署状态</a>
                <a id="githubEditLink" target="_blank" rel="noreferrer">编辑本页</a>
                <a id="githubHistoryLink" target="_blank" rel="noreferrer">更新记录</a>
                <button class="text-button" id="refreshGithub" type="button">刷新</button>
              </div>
            </section>
            <div class="doc-meta" id="docMeta"></div>
            <div id="searchResults" class="search-results" hidden></div>
            <div id="articleContent" class="article-content"></div>

            <section class="feedback" id="feedback">
              <div class="feedback-heading">
                <div>
                  <p class="eyebrow">反馈与修正</p>
                  <h2>本节有错误或缺资料？</h2>
                </div>
                <button class="secondary-button" id="copyPageLink" type="button">复制本页引用</button>
              </div>

              <div class="feedback-layout">
                <form class="feedback-form" id="feedbackForm">
                  <label>
                    昵称
                    <input id="commentName" type="text" maxlength="40" placeholder="可留空" />
                  </label>
                  <label>
                    评论 / 修改建议
                    <textarea
                      id="commentBody"
                      rows="6"
                      placeholder="指出哪一节有误、缺少哪个来源、建议如何改..."
                      required
                    ></textarea>
                  </label>
                  <div class="feedback-actions">
                    <button class="primary-button" type="submit">保存到本地评论</button>
                    <button class="secondary-button" id="copyIssue" type="button">复制修改请求</button>
                    <a class="secondary-button" id="openIssue" target="_blank" rel="noreferrer">打开 Issue 草稿</a>
                  </div>
                </form>

                <div class="update-card">
                  <h3>维护规则</h3>
                  <ol>
                    <li>事实优先查官方文档。</li>
                    <li>社区经验需交叉验证。</li>
                    <li>修改后运行 <code>npm run build</code> 和 <code>npm run check</code>。</li>
                    <li>Issue 应定位到具体章节。</li>
                  </ol>
                </div>
              </div>

              <div class="comments">
                <div class="comments-title">
                  <h3>本地评论</h3>
                  <button class="text-button" id="clearComments" type="button">清空本页评论</button>
                </div>
                <div id="commentsList" class="comments-list"></div>
              </div>
            </section>
          </article>

          <aside class="toc" id="toc" aria-label="本页目录"></aside>
        </div>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="docs-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
